<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sui Jarvis Demo Video</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #09090b;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(77, 162, 255, 0.18), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.16), transparent 30rem),
          #09090b;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 40px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .brand {
        font-size: 18px;
        font-weight: 700;
      }

      .back {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        padding: 10px 14px;
        color: #cbd5e1;
      }

      h1 {
        max-width: 820px;
        margin: 0 0 12px;
        font-size: clamp(36px, 6vw, 72px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0;
        color: #a1a1aa;
        font-size: 18px;
        line-height: 1.6;
      }

      .video-wrap {
        margin-top: 36px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        border-radius: 8px;
        padding: 0 16px;
        background: #fff;
        color: #09090b;
        font-weight: 700;
      }

      .button.secondary {
        background: transparent;
        color: #f8fafc;
        border: 1px solid rgba(255, 255, 255, 0.16);
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a class="brand" href="./">Sui Jarvis</a>
        <a class="back" href="./">Back to site</a>
      </nav>

      <h1>Policy-Bound Agent Wallet Demo</h1>
      <p>
        A 184-second reviewer walkthrough showing policy creation, allowed and blocked intents,
        pause control, testnet evidence, and the Walrus audit receipt path for Sui Overflow 2026.
      </p>

      <div class="video-wrap">
        <video controls preload="metadata" poster="./logo.png">
          <source src="./demo-video.mp4" type="video/mp4" />
        </video>
      </div>

      <div class="links">
        <a class="button" href="https://github.com/wrx1234/sui-jarvis-overflow-2026" target="_blank" rel="noopener">GitHub</a>
        <a class="button secondary" href="./demo-video.mp4" target="_blank" rel="noopener">Open MP4</a>
      </div>
    </main>
  </body>
</html>
